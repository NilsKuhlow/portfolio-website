<style>
/* ============================================================
   Nils Kuhlow — Quiet Precision
   colors_and_type.css
   Drop this file into any HTML page that consumes the system.
   ============================================================ */

/* Helvetica Neue is loaded from the visitor's own system (real Helvetica Neue on
   Apple devices, Arial as the close fallback elsewhere). No font files are bundled
   or redistributed, so the repository carries no font-licence obligations. */

:root {
  /* ────────────────────────────────────────────────────────
     COLORS — base palette
     Pure black & white foundation, single bright-yellow accent.
     No beige, no warm tones, no earth palette.
     ──────────────────────────────────────────────────────── */

  /* Surface — neutral whites & near-blacks */
  --paper-0: #FFFFFF;   /* page background */
  --paper-1: #F5F5F5;   /* card / hover surface */
  --paper-2: #EBEBEB;   /* hover surface 2 */
  --paper-3: #D9D9D9;   /* divider tone */

  /* Ink — neutral greys to true black */
  --ink-1: #0A0A0A;     /* primary text — near-black */
  --ink-2: #404040;     /* secondary text */
  --ink-3: #737373;     /* tertiary / metadata */
  --ink-4: #B3B3B3;     /* hairlines */

  /* Accent — bright yellow */
  --yellow-50:  #FFFBE0;
  --yellow-200: #FFF59A;
  --yellow-500: #FFED29;  /* primary accent — bright */
  --yellow-700: #D9C200;  /* hover/press */

  /* Functional */
  --positive:   #1F8A3F;
  --negative:   #C63A1A;

  /* ────────────────────────────────────────────────────────
     SEMANTIC COLOR ROLES
     ──────────────────────────────────────────────────────── */
  --bg:           var(--paper-0);
  --bg-elevated:  var(--paper-1);
  --bg-hover:     var(--paper-2);
  --fg:           var(--ink-1);
  --fg-muted:     var(--ink-2);
  --fg-subtle:    var(--ink-3);
  --hairline:     rgba(10, 10, 10, 0.12);
  --hairline-strong: rgba(10, 10, 10, 0.24);
  --accent:       #7C3AED;  /* light mode: purple — the complement of yellow */
  --accent-fg:    #FFFFFF;  /* white text on the purple accent */
  --accent-strong: #6D28D9; /* accent hover/press */
  --link:         var(--ink-1);
  --link-hover:   var(--ink-1);

  /* ────────────────────────────────────────────────────────
     TYPE — families
     ──────────────────────────────────────────────────────── */
  /* Single typeface across the whole site — system Helvetica Neue, no bundled files. */
  --font-sans:   "Helvetica Neue", "Helvetica Neue LT Std", Helvetica, Arial, sans-serif;
  --font-serif:  "Helvetica Neue", "Helvetica Neue LT Std", Helvetica, Arial, sans-serif;
  --font-mono:   "Helvetica Neue", "Helvetica Neue LT Std", Helvetica, Arial, sans-serif;

  /* TYPE — scale (1.250 minor third, slightly slowed at the top) */
  --t-12: 0.75rem;     /* 12 — micro labels */
  --t-13: 0.8125rem;   /* 13 — metadata */
  --t-14: 0.875rem;    /* 14 — small body */
  --t-16: 1rem;        /* 16 — body */
  --t-18: 1.125rem;    /* 18 — large body / lede */
  --t-22: 1.375rem;    /* 22 — h4 */
  --t-28: 1.75rem;     /* 28 — h3 */
  --t-36: 2.25rem;     /* 36 — h2 */
  --t-52: 3.25rem;     /* 52 — h1 */
  --t-80: 5rem;        /* 80 — display */
  --t-128: 8rem;       /* 128 — hero display */

  /* TYPE — weights */
  --fw-light:    300;
  --fw-regular:  400;
  --fw-medium:   500;
  --fw-semi:     600;
  --fw-bold:     700;

  /* TYPE — leading + tracking */
  --lh-tight:    1.06;
  --lh-snug:     1.18;
  --lh-body:     1.55;
  --lh-relaxed:  1.7;
  --tr-label:    0.18em;   /* the signature ALL CAPS label */
  --tr-display:  -0.02em;
  --tr-tight:    -0.01em;

  /* ────────────────────────────────────────────────────────
     SPACING — 8-pt base, named for intent
     ──────────────────────────────────────────────────────── */
  --s-1:  4px;
  --s-2:  8px;
  --s-3:  12px;
  --s-4:  16px;
  --s-5:  24px;
  --s-6:  32px;
  --s-7:  40px;
  --s-8:  56px;
  --s-9:  80px;
  --s-10: 120px;
  --s-11: 160px;

  /* RADII — almost always 0 */
  --r-0:  0px;
  --r-1:  2px;
  --r-2:  4px;
  --r-pill: 999px;

  /* BORDERS */
  --bw: 1px;

  /* SHADOWS — removed from the system. Elevation comes from surface tone + hairlines only. */
  --shadow-floating: none;
  --shadow-overlay:  none;

  /* MOTION */
  --easing: cubic-bezier(0.2, 0, 0, 1);
  --dur-fast: 160ms;
  --dur-base: 280ms;
  --dur-slow: 480ms;

  /* LAYOUT */
  --container: 1280px;
  --reading:   640px;
  --rail:      200px;
  --nav-h:     64px;
}

/* ============================================================
   Base — element semantics
   ============================================================ */

html {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-sans);
  font-size: 16px;
  font-weight: var(--fw-regular);
  line-height: var(--lh-body);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--fg);
}

::selection {
  background: #E9DDFF;
  color: var(--ink-1);
}

/* Headings — serif, generous, never crowded */
h1, .h1 {
  font-family: var(--font-serif);
  font-size: clamp(2.5rem, 6vw, var(--t-80));
  font-weight: var(--fw-regular);
  line-height: var(--lh-tight);
  letter-spacing: var(--tr-display);
  margin: 0 0 var(--s-5);
  text-wrap: balance;
}

h2, .h2 {
  font-family: var(--font-serif);
  font-size: clamp(1.75rem, 3.6vw, var(--t-36));
  font-weight: var(--fw-regular);
  line-height: var(--lh-snug);
  letter-spacing: var(--tr-tight);
  margin: 0 0 var(--s-4);
  text-wrap: balance;
}

h3, .h3 {
  font-family: var(--font-serif);
  font-size: var(--t-28);
  font-weight: var(--fw-regular);
  line-height: var(--lh-snug);
  margin: 0 0 var(--s-3);
}

h4, .h4 {
  font-family: var(--font-sans);
  font-size: var(--t-22);
  font-weight: var(--fw-medium);
  line-height: var(--lh-snug);
  letter-spacing: var(--tr-tight);
  margin: 0 0 var(--s-3);
}

/* Display — the title-page hero */
.display {
  font-family: var(--font-serif);
  font-size: clamp(3rem, 9vw, var(--t-128));
  font-weight: var(--fw-light);
  line-height: 0.96;
  letter-spacing: -0.025em;
  text-wrap: balance;
}

/* Lede — the first paragraph of an article */
.lede {
  font-family: var(--font-sans);
  font-size: var(--t-18);
  line-height: var(--lh-relaxed);
  color: var(--fg);
  max-width: 36em;
}

/* Body */
p {
  font-size: var(--t-16);
  line-height: var(--lh-body);
  margin: 0 0 var(--s-4);
  text-wrap: pretty;
}

/* Small / metadata */
.small, small {
  font-size: var(--t-13);
  color: var(--fg-muted);
  line-height: 1.45;
}

/* THE signature label — ALL CAPS metadata */
.label, .eyebrow {
  display: inline-block;
  font-family: var(--font-sans);
  font-size: var(--t-12);
  font-weight: var(--fw-medium);
  letter-spacing: var(--tr-label);
  text-transform: uppercase;
  color: var(--fg-subtle);
  line-height: 1.4;
}

/* Pull quote */
.quote, blockquote {
  font-family: var(--font-serif);
  font-size: clamp(1.5rem, 3vw, 2rem);
  font-weight: var(--fw-light);
  font-style: italic;
  line-height: 1.3;
  margin: var(--s-7) 0;
  padding-left: var(--s-5);
  border-left: 2px solid var(--ink-1);
  text-wrap: balance;
}

/* Mono — metadata accent ONLY */
code, .mono, kbd {
  font-family: var(--font-mono);
  font-size: 0.9em;
  font-feature-settings: "liga" 0;
}

/* Links — underline-on-hover, no colour change */
a {
  color: var(--link);
  text-decoration: none;
  text-underline-offset: 4px;
  text-decoration-thickness: 1px;
  transition: text-decoration-color var(--dur-fast) var(--easing);
}
a:hover { text-decoration: underline; }
a:focus-visible {
  outline: 2px solid var(--ink-1);
  outline-offset: 4px;
}

hr {
  border: 0;
  border-top: 1px solid var(--hairline);
  margin: var(--s-7) 0;
}

img, svg, video {
  display: block;
  max-width: 100%;
  height: auto;
}

/* Buttons — square, hairline */
button, .btn {
  font-family: var(--font-sans);
  font-size: var(--t-14);
  font-weight: var(--fw-medium);
  letter-spacing: 0.02em;
  padding: 12px 20px;
  border: 1px solid var(--ink-1);
  background: transparent;
  color: var(--ink-1);
  border-radius: var(--r-0);
  cursor: pointer;
  transition: background var(--dur-fast) var(--easing),
              transform 80ms var(--easing);
}
button:hover, .btn:hover { background: var(--paper-2); }
button:active, .btn:active { transform: scale(0.99); }
button:focus-visible, .btn:focus-visible {
  outline: 2px solid var(--ink-1);
  outline-offset: 4px;
}

.btn--primary {
  background: var(--ink-1);
  color: var(--paper-0);
}
.btn--primary:hover {
  background: var(--ink-2);
}

.btn--accent {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--accent-fg);
}
.btn--accent:hover {
  background: var(--accent-strong);
  border-color: var(--accent-strong);
}

</style>
<style>
  html, body { background: var(--bg); color: var(--fg); margin: 0; transition: background 280ms cubic-bezier(0.2,0,0,1), color 280ms cubic-bezier(0.2,0,0,1); }
  body[data-theme="dark"] {
    --bg: #0A0A0A;
    --bg-elevated: #161616;
    --bg-hover: #222222;
    --fg: #F5F5F5;
    --fg-muted: #B3B3B3;
    --fg-subtle: #737373;
    --hairline: rgba(245, 245, 245, 0.14);
    --hairline-strong: rgba(245, 245, 245, 0.28);
    --paper-2: #1F1F1F;
    --link: #F5F5F5;
    --accent: var(--yellow-500);   /* dark mode keeps the bright-yellow accent */
    --accent-fg: var(--ink-1);
    --accent-strong: var(--yellow-700);
  }
  body[data-theme="dark"] ::selection { background: var(--yellow-500); color: #0A0A0A; }
  body[data-theme="dark"] .btn--primary { background: var(--fg); color: var(--bg); border-color: var(--fg); }
  body[data-theme="dark"] .btn--primary:hover { background: var(--fg-muted); }
  body[data-theme="dark"] .btn { border-color: var(--fg); color: var(--fg); }
  body[data-theme="dark"] .btn:hover { background: var(--bg-elevated); }
</style>
<style>
  /* ── Yellow interaction layer ───────────────────────────────────────────────
     The accent (--accent) is the hover/active signal across the site. !important
     is required because most elements are styled inline, and inline styles win
     over a plain :hover rule. Yellow underlines/fills read on both the light and
     dark surfaces; the text itself stays --fg so contrast is never an issue. */
  a, button { transition: color 160ms var(--easing), background-color 160ms var(--easing),
    border-color 160ms var(--easing), text-decoration-color 160ms var(--easing),
    box-shadow 160ms var(--easing); }
  .nk-link:hover { text-decoration: underline !important; text-decoration-color: var(--accent) !important;
    text-decoration-thickness: 2px !important; text-underline-offset: 5px !important; }
  .nk-underline:hover { border-bottom-color: var(--accent) !important; }
  .nk-cta:hover { background: var(--accent) !important; border-color: var(--accent) !important;
    color: var(--accent-fg) !important; }
  .nk-fig:hover { box-shadow: 0 0 0 3px var(--accent) !important; }
  .nk-row:hover { background: var(--bg-elevated) !important; box-shadow: inset 4px 0 0 0 var(--accent) !important; }
  .nk-card:hover .nk-card-img { box-shadow: 0 0 0 3px var(--accent) !important; }
  .nk-card:hover .nk-card-ttl { text-decoration: underline; text-decoration-color: var(--accent);
    text-decoration-thickness: 2px; text-underline-offset: 4px; }
  @media (prefers-reduced-motion: reduce) { a, button { transition: none; } }
</style>
<style>
  /* ── Button reset (a11y) — clickable <a>/<div> become real <button> without chrome ── */
  .nk-unbtn { background: none; border: 0; margin: 0; padding: 0; font: inherit; color: inherit;
    text-align: inherit; cursor: pointer; -webkit-appearance: none; appearance: none; }

  /* ── Responsive ─────────────────────────────────────────────────────────────────────
     Inline styles can't carry @media, so layout grids get a className and are overridden
     here with !important. Two-column layouts stack; wide grids drop columns. */
  @media (max-width: 820px) {
    nav { padding-left: 16px !important; padding-right: 16px !important;
      height: auto !important; min-height: var(--nav-h); flex-wrap: wrap; row-gap: 6px; }
    .nk-navlinks { gap: 16px !important; flex-wrap: wrap; justify-content: flex-end; }
    .nk-pad { padding-left: 20px !important; padding-right: 20px !important; }
    .nk-stack { grid-template-columns: 1fr !important; gap: 28px !important; }
    .nk-news { column-count: 1 !important; }
    .nk-footer { grid-template-columns: 1fr 1fr !important; gap: 28px !important; }
    .nk-grid { grid-template-columns: 1fr 1fr !important; }
    .nk-irow { grid-template-columns: 28px 1fr !important; gap: 12px !important; }
    .nk-irow > :nth-child(n+3) { display: none !important; }
  }
  @media (max-width: 520px) {
    .nk-grid { grid-template-columns: 1fr !important; }
    .nk-footer { grid-template-columns: 1fr !important; }
  }
</style>
<style>
  /* ── Per-project image gallery ───────────────────────────────────────────────
     A flexible editorial grid that lets each project compose its own image set:
     two-up by default, full-width items via .nk-gitem-wide, optional dark band. */
  .nk-gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: start; }
  .nk-gallery .nk-gitem { margin: 0; }
  .nk-gallery .nk-gitem-wide { grid-column: 1 / -1; }
  .nk-gcap { font-family: var(--font-sans); font-size: 13px; color: var(--fg-subtle);
    line-height: 1.5; margin-top: 10px; max-width: 44em; }
  .nk-gcap .nk-gcap-k { color: var(--fg); font-weight: 500; }
  /* Dark presentation band — for projects whose imagery is dramatic in low key. */
  .nk-band-dark { background: var(--ink-1); }
  .nk-band-dark .nk-gcap { color: var(--ink-4); }
  .nk-band-dark .nk-gcap .nk-gcap-k { color: #F5F5F5; }
  /* Full-bleed media (hero / sequence) — sits as a direct child of <article>. */
  .nk-bleed { width: 100%; }
  @media (max-width: 820px) {
    .nk-gallery { grid-template-columns: 1fr !important; gap: 20px !important; }
  }
</style>

<body data-screen-label="01 Home" data-theme="dark">
<script>
  /* Apply saved or OS colour scheme before paint — avoids a light→dark flash. */
  (function () {
    try {
      var saved = localStorage.getItem('nk-theme');
      var dark = saved ? saved === 'dark' : true;  /* default to dark unless the visitor chose light */
      document.body.setAttribute('data-theme', dark ? 'dark' : 'light');
    } catch (e) {}
  })();
</script>
